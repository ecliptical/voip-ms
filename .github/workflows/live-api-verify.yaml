name: Live API Verify

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Verification depth
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - extended
      allow_state_changes:
        description: Allow state-changing API checks
        required: true
        default: false
        type: boolean
      allow_costly:
        description: Allow potentially costly API checks (for example sendSMS)
        required: true
        default: false
        type: boolean
      enable_sms_settings_check:
        description: Run idempotent setSMS check on VOIP_MS_TEST_DID
        required: true
        default: false
        type: boolean
      enable_subaccount_check:
        description: Run createSubAccount + delSubAccount lifecycle check
        required: true
        default: false
        type: boolean
      enable_sms_send_check:
        description: Run sendSMS using VOIP_MS_TEST_DID -> VOIP_MS_SMS_DST
        required: true
        default: false
        type: boolean
      enable_location_typed_checks:
        description: Run location-dependent typed checks (getDIDsCAN/getDIDsUSA)
        required: true
        default: false
        type: boolean
      voip_ms_username:
        description: Optional override for voip.ms API username (account email)
        required: false
        default: ""
        type: string
      voip_ms_password:
        description: Optional override for voip.ms API password from the portal API page
        required: false
        default: ""
        type: string
      voip_ms_test_did:
        description: Optional override DID used for SMS and SMS-setting checks
        required: false
        default: ""
        type: string
      voip_ms_sms_dst:
        description: Optional override SMS destination number for costly sendSMS check
        required: false
        default: ""
        type: string
      voip_ms_sms_message:
        description: Optional override SMS body for costly sendSMS check
        required: false
        default: ""
        type: string
      dids_can_province:
        description: Province for getDIDsCAN when location checks are enabled
        required: false
        default: ""
        type: string
      dids_usa_state:
        description: State for getDIDsUSA when location checks are enabled
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  live-verify:
    name: Live API verification
    runs-on: ubuntu-latest
    env:
      VOIP_MS_USERNAME: ${{ github.event_name == 'workflow_dispatch' && inputs.voip_ms_username != '' && inputs.voip_ms_username || secrets.VOIP_MS_USERNAME }}
      VOIP_MS_PASSWORD: ${{ github.event_name == 'workflow_dispatch' && inputs.voip_ms_password != '' && inputs.voip_ms_password || secrets.VOIP_MS_PASSWORD }}
      VOIP_MS_TEST_DID: ${{ github.event_name == 'workflow_dispatch' && inputs.voip_ms_test_did || '' }}
      VOIP_MS_SMS_DST: ${{ github.event_name == 'workflow_dispatch' && inputs.voip_ms_sms_dst || '' }}
      VOIP_MS_SMS_MESSAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.voip_ms_sms_message || '' }}
      LIVE_VERIFY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'smoke' }}
      LIVE_VERIFY_ALLOW_STATE_CHANGES: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_state_changes || false }}
      LIVE_VERIFY_ALLOW_COSTLY: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_costly || false }}
      LIVE_VERIFY_ENABLE_SMS_SETTINGS_CHECK: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_sms_settings_check || false }}
      LIVE_VERIFY_ENABLE_SUBACCOUNT_CHECK: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_subaccount_check || false }}
      LIVE_VERIFY_ENABLE_SMS_SEND_CHECK: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_sms_send_check || false }}
      LIVE_VERIFY_ENABLE_LOCATION_TYPED_CHECKS: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_location_typed_checks || false }}
      LIVE_VERIFY_DIDS_CAN_PROVINCE: ${{ github.event_name == 'workflow_dispatch' && inputs.dids_can_province || '' }}
      LIVE_VERIFY_DIDS_USA_STATE: ${{ github.event_name == 'workflow_dispatch' && inputs.dids_usa_state || '' }}
    steps:
      - name: Check out source code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate required credentials are configured
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${VOIP_MS_USERNAME:-}" || -z "${VOIP_MS_PASSWORD:-}" ]]; then
            echo "Missing VOIP_MS_USERNAME and/or VOIP_MS_PASSWORD (set secrets or manual overrides)"
            exit 1
          fi

      - name: Run live verification harness
        run: cargo run --example live_api_verify
